<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Meal Planner — Login</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;900&family=Crimson+Pro:ital,wght@0,400;1,400&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="blue_card_style.css">
</head>

<body>

<nav id="auth-nav" style="display:flex;justify-content:space-between;align-items:center;gap:12px;padding:12px 24px;background:#1a2a4a;border-bottom:1px solid gold;border-radius:0 0 8px 8px;">
  <div id="nav-user-email" style="color:gold;font-family:'Space Mono',monospace;font-size:12px;">Welcome, Guest</div>
  <button id="sign-out-btn" style="display:none;padding:6px 12px;font-family:'Space Mono',monospace;font-size:11px;background:rgba(200,169,110,0.2);border:1px solid rgba(200,169,110,0.4);border-radius:6px;color:#c8a96e;cursor:pointer;">Sign Out</button>
</nav>

<!-- ── APP CONTAINER START ── -->
<div id="app" style="max-width:500px;margin:40px auto; display:flex; flex-direction:column; gap:30px;">

  <!-- ── SIGN-IN CARD START ── -->
  <div class="card" style="border:2px solid gold;background:#1a2a4a;padding:24px;border-radius:12px;">
    <div class="card-header">
      <h2 style="font-family:'Playfair Display',serif;color:#c8a96e;text-align:center;margin-bottom:12px;">Sign In</h2>
      <hr style="border-color:gold;margin-bottom:16px;">
    </div>
    <div class="card-body" style="display:flex;flex-direction:column;gap:14px;">
      <p style="font-family:'Crimson Pro',serif;color:#e8dcc8;font-size:14px;margin-bottom:10px;">Already have an account? Enter your email and password to sign in:</p>
      <input type="email" id="auth_email" placeholder="Email" style="padding:10px;border-radius:6px;border:1px solid #c8a96e;background:#0f1a33;color:#fff;">
      <input type="password" id="auth_password" placeholder="Password" style="padding:10px;border-radius:6px;border:1px solid #c8a96e;background:#0f1a33;color:#fff;">
      <button id="email-sign-in-btn" class="btn-blue" style="width:100%;padding:12px;">Sign In</button>
    </div>
  </div>
  <!-- ── SIGN-IN CARD END ── -->

  <!-- ── CREATE ACCOUNT CARD START ── -->
  <div class="card" style="border:2px solid gold;background:#1a2a4a;padding:24px;border-radius:12px;">
    <div class="card-header">
      <h2 style="font-family:'Playfair Display',serif;color:#c8a96e;text-align:center;margin-bottom:12px;">Create Account</h2>
      <hr style="border-color:gold;margin-bottom:16px;">
    </div>
    <div class="card-body" style="display:flex;flex-direction:column;gap:14px;">
      <p style="font-family:'Crimson Pro',serif;color:#e8dcc8;font-size:14px;margin-bottom:10px;">
        New here? Enter your username, email, and password below to create an account.
      </p>
      <input type="text" id="create_username" placeholder="Username" style="padding:10px;border-radius:6px;border:1px solid #c8a96e;background:#0f1a33;color:#fff;">
      <input type="email" id="create_email" placeholder="Email" style="padding:10px;border-radius:6px;border:1px solid #c8a96e;background:#0f1a33;color:#fff;">
      <input type="password" id="create_password" placeholder="Password" style="padding:10px;border-radius:6px;border:1px solid #c8a96e;background:#0f1a33;color:#fff;">
      <button id="email-create-btn" class="btn-blue" style="width:100%;padding:12px;">Create Account</button>
      <p id="auth_error" style="display:none;color:red;font-family:'Space Mono',monospace;font-size:12px;text-align:center;"></p>
    </div>
  </div>
  <!-- ── CREATE ACCOUNT CARD END ── -->

  <!-- ── PASSWORD RECOVERY CARD START ── -->
  <div class="card" style="border:2px solid gold;background:#1a2a4a;padding:24px;border-radius:12px;">
    <div class="card-header">
      <h2 style="font-family:'Playfair Display',serif;color:#c8a96e;text-align:center;margin-bottom:12px;">Recover Password</h2>
      <hr style="border-color:gold;margin-bottom:16px;">
    </div>
    <div class="card-body" style="display:flex;flex-direction:column;gap:14px;">
      <p style="font-family:'Crimson Pro',serif;color:#e8dcc8;font-size:14px;margin-bottom:10px;">
        Forgot your password? Enter your email below to recover it:
      </p>
      <input type="email" id="recover_email" placeholder="Email" style="padding:10px;border-radius:6px;border:1px solid #c8a96e;background:#0f1a33;color:#fff;">
      <button id="password-recover-btn" class="btn-blue" style="width:100%;padding:12px;">Send Recovery Email</button>
    </div>
  </div>
  <!-- ── PASSWORD RECOVERY CARD END ── -->

<!-- ── BEGIN CONTACT FORM CARD ── -->
<div class="card" style="border:2px solid gold;background:#1a2a4a;padding:24px;border-radius:12px;">
  <div class="card-header">
    <h2 style="font-family:'Playfair Display',serif;color:#c8a96e;text-align:center;margin-bottom:12px;">Contact Us</h2>
    <hr style="border-color:gold;margin-bottom:16px;">
  </div>
  <div class="card-body" style="display:flex;flex-direction:column;gap:10px;">
    <input type="text" id="contact_title" placeholder="Title" style="padding:10px;border-radius:6px;border:1px solid #c8a96e;background:#0f1a33;color:#fff;">
    <input type="text" id="contact_username" placeholder="Username" style="padding:10px;border-radius:6px;border:1px solid #c8a96e;background:#0f1a33;color:#fff;">
    <input type="email" id="contact_email" placeholder="Email" style="padding:10px;border-radius:6px;border:1px solid #c8a96e;background:#0f1a33;color:#fff;">
    <textarea id="contact_message" placeholder="Message" style="padding:10px;border-radius:6px;border:1px solid #c8a96e;background:#0f1a33;color:#fff;resize:none;height:100px;"></textarea>
    <button id="contact_submit_btn" class="btn-blue" style="width:100%;padding:12px;">Send Message</button>
  </div>
</div>
<!-- ── END CONTACT FORM CARD ── -->
  <!-- ── GO TO HOME BUTTON START ── -->
  <div style="text-align:center;">
    <button onclick="window.location.href='index.html'" class="btn-blue" style="padding:12px 24px;">Go to Home</button>
  </div>
  <!-- ── GO TO HOME BUTTON END ── -->

</div>
<!-- ── APP CONTAINER END ── -->

<script type="module" src="cookbook_auth.js"></script>

</body>
</html>
